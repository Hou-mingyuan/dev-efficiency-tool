<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>开发效率提升工具</title>
    <style>
      #splash{position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;background:#080d1a;transition:opacity .5s}
      #splash.hide{opacity:0;pointer-events:none}
      #splash .logo{width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);display:flex;align-items:center;justify-content:center;font:800 28px/1 system-ui;color:#fff;box-shadow:0 8px 32px rgba(59,130,246,.4);animation:splashPulse 1.5s ease-in-out infinite}
      #splash .text{color:rgba(248,250,252,.7);font:500 14px/1 system-ui;letter-spacing:.05em}
      #splash .bar{width:120px;height:3px;border-radius:99px;background:rgba(255,255,255,.08);overflow:hidden}
      #splash .bar i{display:block;height:100%;width:40%;border-radius:99px;background:linear-gradient(90deg,#3b82f6,#8b5cf6);animation:splashSlide 1s ease-in-out infinite}
      @keyframes splashPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
      @keyframes splashSlide{0%{transform:translateX(-100%)}100%{transform:translateX(350%)}}
    </style>
  </head>
  <body>
    <div id="splash"><div class="logo">L</div><div class="text">Loading...</div><div class="bar"><i></i></div></div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
    <script>window.addEventListener('load',function(){setTimeout(function(){var s=document.getElementById('splash');if(s){s.classList.add('hide');setTimeout(function(){s.remove()},600)}},300)})</script>
  </body>
</html>
